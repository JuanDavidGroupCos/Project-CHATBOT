<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWAN | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-card-content">
          <div class="auth-logo auth-logo-row">
            <img src="./assets/logo.png" alt="Logo SWAN" class="auth-logo-image">
            <span>SWAN</span>
        </div>

          <div class="auth-header">
            <h1>Iniciar sesión</h1>
            <p>Quality Analytics AI</p>
          </div>

          <div id="messageBox" class="message info hidden"></div>

          <form id="loginForm" class="auth-form">
            <div class="form-group">
              <label for="email">Correo</label>
              <input type="email" id="email" placeholder="tu.correo@empresa.com" required>
            </div>

            <div class="form-group">
              <label for="password">Contraseña</label>
              <input type="password" id="password" placeholder="Tu contraseña" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Ingresar</button>

            <div class="auth-forgot-wrapper">
              <button type="button" id="forgotBtn" class="link-btn">¿Olvidaste tu contraseña?</button>
            </div>
          </form>

          <form id="otpForm" class="auth-form hidden">
            <div class="form-group">
              <label for="otpCode">Código de verificación</label>
              <input type="text" id="otpCode" maxlength="6" placeholder="123456" required>
              <small class="auth-hint">Revisa tu correo y escribe el código recibido.</small>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Validar código</button>
            <button type="button" id="backToLoginBtn" class="btn btn-secondary btn-block">Volver</button>
          </form>

          <form id="resetStartForm" class="auth-form hidden">
            <div class="form-group">
              <label for="resetEmail">Correo</label>
              <input type="email" id="resetEmail" placeholder="tu.correo@empresa.com" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Enviar código</button>
            <button type="button" id="cancelResetStartBtn" class="btn btn-secondary btn-block">Cancelar</button>
          </form>

          <form id="resetVerifyForm" class="auth-form hidden">
            <div class="form-group">
              <label for="resetCode">Código</label>
              <input type="text" id="resetCode" maxlength="6" placeholder="123456" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Validar código</button>
            <button type="button" id="cancelResetVerifyBtn" class="btn btn-secondary btn-block">Cancelar</button>
          </form>

          <form id="resetCompleteForm" class="auth-form hidden">
            <div class="form-group">
              <label for="newPassword">Nueva contraseña</label>
              <input type="password" id="newPassword" placeholder="Nueva contraseña" required>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirmar contraseña</label>
              <input type="password" id="confirmPassword" placeholder="Repite la contraseña" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Cambiar contraseña</button>
            <button type="button" id="cancelResetCompleteBtn" class="btn btn-secondary btn-block">Cancelar</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>
</html>
